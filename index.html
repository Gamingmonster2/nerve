<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nerve UI | البناء العصبى الحر بدون لمس</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --bg-pure: #000000;
            --bg-neon: #030008;
            --accent-cyan: #00f2fe;
            --accent-pink: #ff007f;
            --glass-bg: rgba(10, 10, 15, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-pure);
            color: #fff;
            font-family: system-ui, sans-serif;
            overflow: hidden;
            width: 100vw; height: 100vh;
        }

        /* مسرح العمليات الرئيسي */
        #gameCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        /* نافذة الكاميرا المصغرة والمعكوسة */
        #webcam {
            position: absolute;
            bottom: 20px; left: 20px;
            width: 160px; height: 120px;
            border-radius: 12px;
            border: 2px solid var(--accent-cyan);
            transform: scaleX(-1);
            z-index: 10;
            background: #111;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        /* لوحة التحكم الزجاجية */
        .control-panel {
            position: absolute;
            top: 20px; right: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 16px;
            z-index: 10;
            width: 280px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .panel-title {
            font-size: 1.1rem; margin: 0 0 15px 0; font-weight: 700;
            background: linear-gradient(135deg, #fff, var(--accent-cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-group label {
            display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 8px;
        }

        .btn-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
        }

        .panel-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: #fff; padding: 8px; border-radius: 8px;
            cursor: pointer; font-size: 0.8rem; transition: all 0.2s;
        }

        .panel-btn:hover {
            border-color: var(--accent-cyan);
            background: rgba(0, 242, 254, 0.05);
        }

        .panel-btn.active {
            background: var(--accent-cyan);
            color: #000; font-weight: bold;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
        }

        /* مؤشر حالة تتبع الحركة */
        .status-indicator {
            display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: #94a3b8;
        }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%; background: #ff4757;
        }
        .status-dot.active {
            background: #2ed573; box-shadow: 0 0 8px #2ed573;
        }
    </style>
</head>
<body>

    <video id="webcam" autoplay playsinline></video>
    <canvas id="gameCanvas"></canvas>

    <div class="control-panel">
        <div class="panel-title">🧠 نظام التحكم العصبي Nerve v1.0</div>
        
        <div class="control-group">
            <label>خلفية البيئة:</label>
            <div class="btn-grid">
                <button class="panel-btn active" onclick="setBg('pure')">مظلم مطلق</button>
                <button class="panel-btn" onclick="setBg('neon')">فضاء نيون</button>
            </div>
        </div>

        <div class="control-group">
            <label>هيكل المكعبات:</label>
            <div class="btn-grid">
                <button class="panel-btn active" onclick="setStyle('neon')">إطار متوهج</button>
                <button class="panel-btn" onclick="setStyle('solid')">صلب معتم</button>
            </div>
        </div>

        <hr style="border: 0; border-top: 1px solid var(--glass-border); margin: 15px 0;">
        
        <div class="status-indicator">
            <div id="statusDot" class="status-dot"></div>
            <span id="statusText">جاري تشغيل الكاميرا...</span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const videoElement = document.getElementById('webcam');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        // ضبط أبعاد مسرح العمليات
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // إعدادات البيئة والمظهر الإفتراضي
        let currentBg = 'pure';
        let currentStyle = 'neon';
        
        // المتغيرات البرمجية لتتبع اليد وميكانيكا المكعبات
        let pointer = { x: 0, y: 0, isPinching: false };
        let blocks = [];
        let grabbedBlock = null;
        const GRID_SIZE = 60;
        
        // توليد مكعب في منطقة الاستدعاء (Spawn Zone) أسفل الشاشة
        function spawnBlock() {
            return {
                x: canvas.width / 2 - 30,
                y: canvas.height - 100,
                w: GRID_SIZE,
                h: GRID_SIZE,
                isStatic: false,
                color: '#00f2fe'
            };
        }
        
        // إدخال المكعب الأول
        blocks.push(spawnBlock());

        function setBg(type) {
            currentBg = type;
            document.querySelectorAll('.control-group:nth-child(2) .panel-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }

        function setStyle(type) {
            currentStyle = type;
            document.querySelectorAll('.control-group:nth-child(3) .panel-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }

        // محرك الرسم والحركة (Animation Loop)
        function drawLoop() {
            // 1. رسم الخلفية المحددة
            if (currentBg === 'pure') {
                ctx.fillStyle = '#000000';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = '#030008';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                // خطوط نيون هندسية خفيفة في الخلفية
                ctx.strokeStyle = 'rgba(255, 0, 127, 0.03)';
                ctx.lineWidth = 1;
                for(let i=0; i<canvas.width; i+=80) {
                    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
                }
            }

            // 2. رسم أرضية البناء الثابتة
            ctx.fillStyle = 'rgba(255,255,255,0.05)';
            ctx.fillRect(0, canvas.height - 40, canvas.width, 40);

            // 3. تحديث ورسم المكعبات
            blocks.forEach(block => {
                if (block === grabbedBlock) {
                    // سحب المكعب مع حركة الأصبع المضموم
                    block.x = pointer.x - block.w / 2;
                    block.y = pointer.y - block.h / 2;
                }

                ctx.beginPath();
                if (currentStyle === 'neon') {
                    ctx.fillStyle = 'rgba(0, 242, 254, 0.1)';
                    ctx.fillRect(block.x, block.y, block.w, block.h);
                    ctx.strokeStyle = block.color;
                    ctx.lineWidth = 3;
                    ctx.strokeRect(block.x, block.y, block.w, block.h);
                } else {
                    ctx.fillStyle = block.color;
                    ctx.fillRect(block.x, block.y, block.w, block.h);
                    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                    ctx.strokeRect(block.x, block.y, block.w, block.h);
                }
            });

            // 4. رسم مؤشر حركة الأصبع العصبي
            ctx.beginPath();
            ctx.arc(pointer.x, pointer.y, pointer.isPinching ? 8 : 14, 0, Math.PI * 2);
            ctx.fillStyle = pointer.isPinching ? '#ff007f' : 'rgba(0, 242, 254, 0.5)';
            ctx.fill();
            if(!pointer.isPinching) {
                ctx.strokeStyle = '#00f2fe';
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            requestAnimationFrame(drawLoop);
        }

        // معالجة بيانات تتبع اليد من الكاميرا عبر MediaPipe
        function onResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                statusDot.className = "status-dot active";
                statusText.innerText = "الاتصال العصبي نشط 🧠";

                const hand = results.multiHandLandmarks[0];
                
                // الحصول على إحداثيات رأس السبابة (Landmark 8) والإبهام (Landmark 4)
                const indexFinger = hand[8];
                const thumb = hand[4];

                // تحويل الإحداثيات إلى حجم الشاشة مع محاكاة المرآة العكسية (1 - x)
                pointer.x = (1 - indexFinger.x) * canvas.width;
                pointer.y = indexFinger.y * canvas.height;

                // حساب المسافة الرياضية بين الإبهام والسبابة لمعرفة هل تم الضم (Pinch/Grab) أم لا
                const distance = Math.hypot(indexFinger.x - thumb.x, indexFinger.y - thumb.y);
                
                if (distance < 0.06) {
                    if (!pointer.isPinching) {
                        pointer.isPinching = true;
                        // محاولة الإمساك بمكعب قريب
                        blocks.forEach(block => {
                            if (pointer.x > block.x && pointer.x < block.x + block.w &&
                                pointer.y > block.y && pointer.y < block.y + block.h) {
                                grabbedBlock = block;
                                block.color = '#ff007f'; // تغيير لون المكعب أثناء المسك
                            }
                        });
                    }
                } else {
                    if (pointer.isPinching) {
                        pointer.isPinching = false;
                        if (grabbedBlock) {
                            // محاذاة فيزيائية للمكعب (Grid Snapping) عند تركه لكي يصطف كحائط متناسق
                            grabbedBlock.x = Math.round(grabbedBlock.x / GRID_SIZE) * GRID_SIZE;
                            grabbedBlock.y = Math.round(grabbedBlock.y / GRID_SIZE) * GRID_SIZE;
                            grabbedBlock.color = '#00f2fe';
                            grabbedBlock = null;
                            
                            // استدعاء مكعب جديد فوراً في منطقة الدعم للاستمرار في البناء
                            blocks.push(spawnBlock());
                        }
                    }
                }
            } else {
                statusDot.className = "status-dot";
                statusText.innerText = "لم يتم رصد حركة يد...";
            }
        }

        // تفعيل وإعداد شبكة العصب MediaPipe Hands
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults(onResults);

        // تشغيل تدفق الكاميرا وربطه بالمحرك
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 640,
            height: 480
        });
        
        camera.start().then(() => {
            statusText.innerText = "ضع يدك أمام الكاميرا للبناء";
            drawLoop(); // انطلاق حلقة الرسم
        });
    </script>
</body>
</html>
